<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Black Stuff - Digital Menu</title>

<style>
:root{
  --bg:#050505;
  --gold:#c9a24a;
  --cream:#f4efe3;
  --muted:#b8ad9b;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  color:var(--cream);
  text-align:center;
  background:
    radial-gradient(circle at top,#16472f 0%,#07130e 42%,#050505 82%),
    #050505;
}

.page{
  max-width:460px;
  margin:0 auto;
  padding:34px 20px 28px;
}

.logo{
  width:82%;
  max-width:330px;
  margin:0 auto 26px;
  display:block;
  filter:drop-shadow(0 18px 35px rgba(0,0,0,.65));
}

.kicker{
  color:var(--gold);
  font-size:13px;
  font-weight:800;
  letter-spacing:2.5px;
  text-transform:uppercase;
  margin-bottom:8px;
}

h1{
  margin:0;
  font-size:34px;
  line-height:1.05;
  letter-spacing:1px;
}

.subtitle{
  margin:12px 0 26px;
  color:var(--muted);
  font-size:15px;
}

.menu-card{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(201,162,74,.35);
  border-radius:28px;
  padding:16px;
  box-shadow:0 18px 50px rgba(0,0,0,.45);
  backdrop-filter:blur(10px);
}

.menu-btn{
  display:flex;
  justify-content:space-between;
  align-items:center;
  text-decoration:none;
  color:#111;
  background:linear-gradient(180deg,#fff8ea,#e7dcc8);
  border-radius:18px;
  padding:18px 18px;
  margin:12px 0;
  font-size:19px;
  font-weight:900;
  box-shadow:0 8px 18px rgba(0,0,0,.25);
}

.menu-btn:active{
  transform:scale(.98);
}

.flag{
  font-size:25px;
}

.social{
  margin-top:30px;
  color:var(--muted);
  font-size:14px;
}

.social-links{
  margin-top:12px;
}

.social a{
  display:inline-block;
  color:var(--gold);
  text-decoration:none;
  font-weight:900;
  padding:10px 14px;
  border:1px solid rgba(201,162,74,.35);
  border-radius:999px;
  margin:4px;
  background:rgba(255,255,255,.04);
}

.wifi{
  margin-top:24px;
  padding:18px;
  border-radius:22px;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.12);
  font-size:15px;
  line-height:1.7;
}

.wifi-title{
  color:var(--gold);
  font-weight:900;
  margin-bottom:4px;
}

.wifi strong{
  color:var(--cream);
}

.footer{
  margin-top:24px;
  color:#83796c;
  font-size:12px;
}
</style>
</head>

<body>

<div class="page">

  <img class="logo" src="logo.png" alt="The Black Stuff logo">

  <div class="kicker">The Black Stuff Irish Pub</div>
  <h1>Digital Menu</h1>
  <div class="subtitle">Choose your language</div>

  <div class="menu-card">
    <a class="menu-btn" href="menu-it.pdf">Italiano <span class="flag">🇮🇹</span></a>
    <a class="menu-btn" href="menu-en.pdf">English <span class="flag">🇬🇧</span></a>
    <a class="menu-btn" href="menu-de.pdf">Deutsch <span class="flag">🇩🇪</span></a>
    <a class="menu-btn" href="menu-es.pdf">Español <span class="flag">🇪🇸</span></a>
  </div>

  <div class="social">
    Follow us
    <div class="social-links">
      <a href="https://www.instagram.com/theblackstuffud?igsh=MW9tZWViMXBvdDFxNA%3D%3D&utm_source=qr" target="_blank">Instagram</a>
      <a href="https://www.facebook.com/TheBlackStuffUdine?" target="_blank">Facebook</a>
    </div>
  </div>

  <div class="wifi">
    <div class="wifi-title">📶 Free Wi-Fi</div>
    Rete: <strong>TheBlackStuff</strong><br>
    Password: <strong>theblackstuff</strong>
  </div>

  <div class="footer">
    The Black Stuff Irish Pub · Udine
  </div>

</div>

</body>
</html>
