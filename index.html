<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Black Stuff - Digital Menu</title>

<style>
:root{
  --gold:#c9a24a;
  --cream:#f4efe3;
  --muted:#b9ae9d;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  min-height:100%;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  color:var(--cream);
  text-align:center;
  background:
    radial-gradient(circle at top,#174c33 0%,#06110c 45%,#030303 85%);
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 20% 10%,rgba(201,162,74,.12),transparent 26%),
    linear-gradient(120deg,rgba(255,255,255,.04),transparent 35%);
}

.page{
  width:min(92vw,460px);
  min-height:100svh;
  margin:0 auto;
  padding:clamp(16px,4vh,38px) 0 26px;
  animation:fadeIn .6s ease both;
}

.logo{
  width:clamp(135px,42vw,280px);
  max-height:clamp(85px,18vh,170px);
  object-fit:contain;
  margin:0 auto clamp(14px,3vh,24px);
  display:block;
  filter:drop-shadow(0 16px 30px rgba(0,0,0,.7));
  animation:logoIn .7s ease both;
}

.kicker{
  color:var(--gold);
  font-size:clamp(10px,2.8vw,13px);
  font-weight:900;
  letter-spacing:clamp(1.6px,.6vw,2.8px);
  text-transform:uppercase;
  margin-bottom:8px;
}

h1{
  margin:0;
  font-size:clamp(28px,8vw,42px);
  line-height:1;
  letter-spacing:.5px;
}

.subtitle{
  margin:10px 0 clamp(16px,3vh,26px);
  color:var(--muted);
  font-size:clamp(14px,3.7vw,16px);
  font-weight:600;
}

.menu-card{
  background:rgba(8,8,8,.58);
  border:1px solid rgba(201,162,74,.38);
  border-radius:clamp(22px,6vw,30px);
  padding:clamp(12px,3vw,16px);
  box-shadow:0 20px 55px rgba(0,0,0,.5);
  backdrop-filter:blur(12px);
  animation:up .7s ease .1s both;
}

.menu-btn{
  display:flex;
  justify-content:space-between;
  align-items:center;
  text-decoration:none;
  color:#111;
  background:linear-gradient(180deg,#fff8ea,#e6dac4);
  border-radius:clamp(15px,4vw,20px);
  padding:clamp(14px,4vw,20px) clamp(18px,4vw,22px);
  margin:clamp(9px,2.4vw,13px) 0;
  font-size:clamp(18px,5vw,21px);
  font-weight:950;
  box-shadow:0 9px 18px rgba(0,0,0,.28);
  transition:transform .18s ease, box-shadow .18s ease;
}

.menu-btn:active{
  transform:scale(.985);
}

.flag{
  font-size:clamp(22px,6vw,27px);
}

.social{
  margin-top:clamp(18px,4vh,30px);
  color:var(--muted);
  font-size:clamp(13px,3.5vw,14px);
  animation:up .7s ease .2s both;
}

.social a{
  display:inline-block;
  color:var(--gold);
  text-decoration:none;
  font-weight:900;
  padding:10px 15px;
  border:1px solid rgba(201,162,74,.35);
  border-radius:999px;
  margin:10px 5px 0;
  background:rgba(255,255,255,.045);
}

.wifi{
  margin-top:clamp(16px,3vh,24px);
  padding:clamp(14px,3.6vw,18px);
  border-radius:22px;
  background:rgba(0,0,0,.36);
  border:1px solid rgba(255,255,255,.12);
  font-size:clamp(14px,3.6vw,15px);
  line-height:1.7;
  animation:up .7s ease .28s both;
}

.wifi-title{
  color:var(--gold);
  font-weight:900;
  margin-bottom:4px;
}

.footer{
  margin-top:20px;
  color:#83796c;
  font-size:12px;
  animation:up .7s ease .34s both;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes logoIn{
  from{opacity:0; transform:translateY(-8px) scale(.96)}
  to{opacity:1; transform:translateY(0) scale(1)}
}

@keyframes up{
  from{opacity:0; transform:translateY(12px)}
  to{opacity:1; transform:translateY(0)}
}

@media (max-width:430px){
  .page{
    width:90vw;
    padding-top:14px;
  }

  .logo{
    width:150px;
    max-height:95px;
    margin-bottom:14px;
  }

  h1{
    font-size:30px;
  }

  .subtitle{
    margin-bottom:14px;
  }

  .menu-btn{
    padding:14px 18px;
    margin:9px 0;
  }
}

@media (max-height:720px){
  .logo{
    width:135px;
    max-height:80px;
    margin-bottom:10px;
  }

  .page{
    padding-top:12px;
  }

  .social{
    margin-top:16px;
  }

  .wifi{
    margin-top:12px;
  }
}

@media (min-width:768px){
  .page{
    width:min(62vw,500px);
    padding-top:42px;
  }

  .logo{
    width:min(320px,42vw);
    max-height:210px;
  }
}
</style>
</head>

<body>

<main class="page">

  <img class="logo" src="./logo.png" alt="The Black Stuff logo"
  onerror="
    if(!this.dataset.try1){this.dataset.try1=1; this.src='./logo.PNG';}
    else if(!this.dataset.try2){this.dataset.try2=1; this.src='./logo.jpg';}
    else if(!this.dataset.try3){this.dataset.try3=1; this.src='./logo.jpeg';}
    else{this.style.display='none';}
  ">

  <div class="kicker">The Black Stuff Irish Pub</div>
  <h1>Digital Menu</h1>
  <div class="subtitle">Choose your language</div>

  <section class="menu-card">
    <a class="menu-btn" href="./menu-it.pdf">Italiano <span class="flag">🇮🇹</span></a>
    <a class="menu-btn" href="./menu-en.pdf">English <span class="flag">🇬🇧</span></a>
    <a class="menu-btn" href="./menu-de.pdf">Deutsch <span class="flag">🇩🇪</span></a>
    <a class="menu-btn" href="./menu-es.pdf">Español <span class="flag">🇪🇸</span></a>
  </section>

  <div class="social">
    Follow us<br>
    <a href="https://www.instagram.com/theblackstuffud?igsh=MW9tZWViMXBvdDFxNA%3D%3D&utm_source=qr" target="_blank">Instagram</a>
    <a href="https://www.facebook.com/TheBlackStuffUdine" target="_blank">Facebook</a>
  </div>

  <div class="wifi">
    <div class="wifi-title">📶 Free Wi-Fi</div>
    Rete: <strong>TheBlackStuff</strong><br>
    Password: <strong>theblackstuff</strong>
  </div>

  <div class="footer">
    The Black Stuff Irish Pub · Udine
  </div>

</main>

</body>
</html>
