<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Black Stuff - Digital Menu</title>

<style>
:root{
  --gold:#c9a24a;
  --cream:#f4efe3;
  --muted:#b9ae9d;
  --dark:#050505;
  --card:rgba(10,10,10,.58);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  min-height:100%;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  color:var(--cream);
  text-align:center;
  background:
    radial-gradient(circle at top,#1b5136 0%,#07130e 42%,#050505 82%);
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(120deg,rgba(255,255,255,.045),transparent 30%,rgba(255,255,255,.025) 60%,transparent),
    radial-gradient(circle at 20% 10%,rgba(201,162,74,.13),transparent 28%);
  opacity:.75;
}

.page{
  width:min(92vw,460px);
  min-height:100svh;
  margin:0 auto;
  padding:clamp(18px,4vh,38px) 0 28px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  animation:pageIn .7s ease both;
}

.logo{
  width:clamp(160px,44vw,300px);
  max-height:clamp(95px,22vh,210px);
  object-fit:contain;
  margin:0 auto clamp(18px,3vh,28px);
  display:block;
  filter:drop-shadow(0 18px 36px rgba(0,0,0,.72));
  animation:logoIn .8s ease .08s both;
}

.kicker{
  color:var(--gold);
  font-size:clamp(11px,2.7vw,13px);
  font-weight:900;
  letter-spacing:clamp(1.7px,.6vw,2.8px);
  text-transform:uppercase;
  margin-bottom:8px;
}

h1{
  margin:0;
  color:var(--cream);
  font-size:clamp(28px,8vw,42px);
  line-height:1;
  letter-spacing:.5px;
}

.subtitle{
  margin:12px 0 clamp(18px,3vh,28px);
  color:var(--muted);
  font-size:clamp(14px,3.6vw,16px);
  font-weight:600;
}

.menu-card{
  background:var(--card);
  border:1px solid rgba(201,162,74,.38);
  border-radius:clamp(22px,6vw,30px);
  padding:clamp(12px,3vw,16px);
  box-shadow:0 20px 55px rgba(0,0,0,.5);
  backdrop-filter:blur(12px);
  animation:cardIn .7s ease .16s both;
}

.menu-btn{
  display:flex;
  justify-content:space-between;
  align-items:center;
  text-decoration:none;
  color:#111;
  background:linear-gradient(180deg,#fff8ea,#e6dac4);
  border-radius:clamp(16px,4vw,20px);
  padding:clamp(15px,4.2vw,20px) clamp(18px,4vw,22px);
  margin:clamp(10px,2.5vw,13px) 0;
  font-size:clamp(18px,5vw,21px);
  font-weight:950;
  box-shadow:0 9px 18px rgba(0,0,0,.28);
  transform:translateY(0);
  transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
}

.menu-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 13px 24px rgba(0,0,0,.34);
  filter:brightness(1.03);
}

.menu-btn:active{
  transform:scale(.985);
}

.flag{
  font-size:clamp(22px,6vw,27px);
}

.social{
  margin-top:clamp(22px,4vh,32px);
  color:var(--muted);
  font-size:clamp(13px,3.5vw,14px);
  animation:fadeUp .7s ease .24s both;
}

.social a{
  display:inline-block;
  color:var(--gold);
  text-decoration:none;
  font-weight:900;
  padding:10px 15px;
  border:1px solid rgba(201,162,74,.35);
  border-radius:999px;
  margin:12px 5px 0;
  background:rgba(255,255,255,.045);
}

.wifi{
  margin-top:clamp(18px,3vh,24px);
  padding:clamp(14px,3.6vw,18px);
  border-radius:22px;
  background:rgba(0,0,0,.36);
  border:1px solid rgba(255,255,255,.12);
  font-size:clamp(14px,3.6vw,15px);
  line-height:1.7;
  animation:fadeUp .7s ease .32s both;
}

.wifi-title{
  color:var(--gold);
  font-weight:900;
  margin-bottom:4px;
}

.footer{
  margin-top:20px;
  color:#83796c;
  font-size:12px;
  animation:fadeUp .7s ease .38s both;
}

@keyframes pageIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes logoIn{
  from{opacity:0; transform:translateY(-10px) scale(.96)}
  to{opacity:1; transform:translateY(0) scale(1)}
}

@keyframes cardIn{
  from{opacity:0; transform:translateY(14px)}
  to{opacity:1; transform:translateY(0)}
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

@media (max-height:720px){
  .page{
    padding-top:14px;
  }

  .logo{
    width:clamp(130px,38vw,220px);
    max-height:120px;
    margin-bottom:14px;
  }

  .subtitle{
    margin-bottom:14px;
  }

  .menu-btn{
    padding-top:14px;
    padding-bottom:14px;
    margin:9px 0;
  }

  .social{
    margin-top:18px;
  }

  .wifi{
    margin-top:14px;
  }
}

@media (min-width:768px){
  .page{
    width:min(62vw,500px);
    padding-top:42px;
  }

  .logo{
    width:min(360px,48vw);
    max-height:240px;
  }
}
</style>
</head>

<body>

<main class="page">

  <img class="logo" src="./logo.png" alt="The Black Stuff logo"
  onerror="
    if(!this.dataset.try1){this.dataset.try1=1; this.src='./logo.PNG';}
    else if(!this.dataset.try2){this.dataset.try2=1; this.src='./logo.jpg';}
    else if(!this.dataset.try3){this.dataset.try3=1; this.src='./logo.jpeg';}
    else{this.style.display='none';}
  ">

  <div class="kicker">The Black Stuff Irish Pub</div>
  <h1>Digital Menu</h1>
  <div class="subtitle">Choose your language</div>

  <section class="menu-card">
    <a class="menu-btn" href="./menu-it.pdf">Italiano <span class="flag">🇮🇹</span></a>
    <a class="menu-btn" href="./menu-en.pdf">English <span class="flag">🇬🇧</span></a>
    <a class="menu-btn" href="./menu-de.pdf">Deutsch <span class="flag">🇩🇪</span></a>
    <a class="menu-btn" href="./menu-es.pdf">Español <span class="flag">🇪🇸</span></a>
  </section>

  <div class="social">
    Follow us<br>
    <a href="https://www.instagram.com/theblackstuffud?igsh=MW9tZWViMXBvdDFxNA%3D%3D&utm_source=qr" target="_blank">Instagram</a>
    <a href="https://www.facebook.com/TheBlackStuffUdine" target="_blank">Facebook</a>
  </div>

  <div class="wifi">
    <div class="wifi-title">📶 Free Wi-Fi</div>
    Rete: <strong>TheBlackStuff</strong><br>
    Password: <strong>theblackstuff</strong>
  </div>

  <div class="footer">
    The Black Stuff Irish Pub · Udine
  </div>

</main>

</body>
</html>
